name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - name: Select Simulators
        run: |
          IOS_SIMULATOR_ID=$(xcrun simctl list devices available -j | ruby -rjson -e 'devices = JSON.parse(STDIN.read)["devices"].find { |runtime, _| runtime.end_with?("iOS-26-4") }.last; puts devices.find { |device| device["name"] == "iPhone 17" }.fetch("udid")')
          export IOS_SIMULATOR_ID
          WATCH_SIMULATOR_ID=$(xcrun simctl list pairs -j | ruby -rjson -e 'pairs = JSON.parse(STDIN.read)["pairs"].values; puts pairs.find { |pair| pair.fetch("phone").fetch("udid") == ENV.fetch("IOS_SIMULATOR_ID") }.fetch("watch").fetch("udid")')
          echo "IOS_SIMULATOR_ID=$IOS_SIMULATOR_ID" >> "$GITHUB_ENV"
          echo "WATCH_SIMULATOR_ID=$WATCH_SIMULATOR_ID" >> "$GITHUB_ENV"
      - name: Boot Simulator
        run: |
          xcrun simctl boot "$IOS_SIMULATOR_ID"
          xcrun simctl bootstatus "$IOS_SIMULATOR_ID" -b
      - name: Build Daily Notes
        run: xcodebuild build -project DailyNotes.xcodeproj -scheme DailyNotes -destination "platform=iOS Simulator,id=$IOS_SIMULATOR_ID,arch=arm64"
      - name: Test Daily Notes
        run: xcodebuild test -project DailyNotes.xcodeproj -scheme DailyNotes -destination "platform=iOS Simulator,id=$IOS_SIMULATOR_ID,arch=arm64" -parallel-testing-enabled NO
      - name: Build Habit Tracker iOS
        run: xcodebuild build -project HabitTracker.xcodeproj -scheme HabitTracker -destination "platform=iOS Simulator,id=$IOS_SIMULATOR_ID,arch=arm64"
      - name: Test Habit Tracker iOS
        run: xcodebuild test -project HabitTracker.xcodeproj -scheme HabitTracker -destination "platform=iOS Simulator,id=$IOS_SIMULATOR_ID,arch=arm64" -parallel-testing-enabled NO
      - name: Build Habit Tracker watchOS
        run: xcodebuild build -project HabitTracker.xcodeproj -scheme HabitTrackerWatch -destination "platform=watchOS Simulator,id=$WATCH_SIMULATOR_ID,arch=arm64"
